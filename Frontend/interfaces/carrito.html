<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Tinta Brava</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../styles/carrito.css">
</head>
<body>

    <div class="cabecera-pagina d-flex align-items-center gap-2">
        <h1 class="titulo-pagina m-0">CARRITO</h1>
        <img src="../imagenes/iconos/carrito.png" alt="Icono Carrito" class="icono-carrito-texto" style="height: 1em; width: auto;">
    </div>  
        
    <div id="contenedor-carrito-activo">
        <div class="lista-items" id="lista-items">
            </div>

        <div class="seccion-pago" id="seccion-pago">
            <div class="resumen-total">
                <span class="titulo-total">Total</span>
                <span class="monto-total" id="monto-total">$0.00</span>
            </div>
            <div class="contenedor-btn-pagar">
                <button class="btn-pagar" id="btn-pagar">PROCEDER AL PAGO</button>
            </div>
        </div>
    </div>

    <div class="seccion-vacía" id="seccion-vacía" style="display: none;">
        <p class="mensaje-vacío">Tu carrito está vacío</p>
        <a href="gorras.html" class="link-regresar" style="text-decoration: none;">
            <button class="btn-regresar">Regresar a la tienda</button>
        </a>
    </div>

    <div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content contenedor-modal">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4">
                    <p class="texto-modal">Estás a punto de eliminar este producto del carrito.</p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center gap-2">
                    <button type="button" class="btn-modal btn-confirmar" id="btn-modal-ok">De acuerdo</button>
                    <button type="button" class="btn-modal btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js-scripts/script-carrito.js"></script>
</body>
</html>
