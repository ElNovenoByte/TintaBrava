<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tinta Brava - Playeras</title>

  <!-- Bootstrap + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../styles/estilo-playeras.css">
  <link rel="stylesheet" href="../styles/estilo-navbar.css">

  <link rel="stylesheet" href="../styles/estilo-footer.css">

  <style>
    /* ── ESTILOS DEL FILTRADO ── */
    .filter-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0 50px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem;
      letter-spacing: 1.5px;
      padding: 8px 30px;
      border: 2px solid #000000;
      background-color: transparent;
      color: #000000;
      border-radius: 0px; /* Estilo urbano/rígido */
      transition: all 0.3s ease;
      cursor: pointer;
      text-transform: uppercase;
    }

    /* Estado activo y hover del botón */
    .filter-btn:hover,
    .filter-btn.active {
      background-color: #E5383B; /* Rojo Tinta Brava */
      color: #FFFFFF !important;
      border-color: #E5383B;
      box-shadow: 0 4px 15px rgba(229, 56, 59, 0.3);
      transform: translateY(-2px);
    }

    /* Animación suave para cuando aparecen/desaparecen las tarjetas */
    .col-product {
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .col-product.hidden {
      display: none !important;
      opacity: 0;
      transform: scale(0.8);
    }

    .col-product.show {
      display: block !important;
      animation: fadeInUp 0.4s forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

<!-- ========== HERO ========== -->

  <video autoplay muted loop playsinline class="video-bg">

</div>

</div>

    <!-- ══ BOTONES DE FILTRADO INTERACTIVO ══ -->
    <div class="filter-container">
      <button class="filter-btn active" onclick="filterCategory('todos')">Todos</button>
      <button class="filter-btn" onclick="filterCategory('bandas')">Bandas</button>
