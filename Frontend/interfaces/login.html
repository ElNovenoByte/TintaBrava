<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINTA BRAVA - INICION DE SESION</title>
     <!-- Bootstrap 5 CSS + Icons + Google Fonts + CSS-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> 
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="../styles/estilo-footer.css">
  <link rel="stylesheet" href="../styles/estilo-login.css">
</head>

<body>
    
<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="login-container row">

<!-- IZQUIERDA -->
<div class="col-md-6 left-side">
<div class="overlay"></div>
</div>

<!-- DERECHA -->
<div class="col-md-6 right-side">
        <div class="login-box">
            <h2>INICIAR SESIÓN</h2>
            <form id="loginForm" novalidate>

                <div class="mb-3">
                    <input type="email" id="correo" class="form-control" placeholder="Correo electrónico" required>
                    <small class="error-message" id="errorCorreo"></small>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <input type="password" class="form-control" placeholder="Contraseña" required id="passwordInput">
                        <span class="input-group-text" style="cursor: pointer;">
                    <img src="../imagenes/iconos/ojo_abierto.png" alt="Mostrar contraseña" style="width: 20px;" id="togglePassword">
                </span>
                    </div>
                    <small class="error-message" id="errorPassword"></small>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn login-btn">Entrar</button>
                </div>

                <div class="d-grid mt-1">
                    <a href="../interfaces/registro.html" class="btn registro-btn">Registrarte</a>
                </div>

            </form>
            <!-- 
            <div class="forgot mt-4">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
            -->
            <div class="volver-container">
                <button id="btnVolver" class="btn-volver" title="Volver a la página anterior">
                    <img src="../imagenes/iconos/volver.png" alt="Volver">
                </button>
            </div>

        </div>
    </div>

</div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js-scripts/script-contactanos.js"></script>
<script src="../js-scripts/script-cargarcomponentes.js"></script>
<script src="../js-scripts/script-login.js"></script>
</body>
</html>
