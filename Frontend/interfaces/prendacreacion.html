<!DOCTYPE html>
<html data-bs-theme="light" lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Tinta Brava - Creación de prendas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles/estilo-prendacreacion.css">
    <link rel="stylesheet" href="../styles/estilo-navbar.css">
    <link rel="stylesheet" href="../styles/estilo-footer.css">
</head>

<body>

<!-- ========== NAVBAR ========== -->
<div id="navbar-placeholder"></div>

    <main>
        <section>
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-3 text-center" style="border-right-width: 1px;border-right-style: solid;"><a href="#" style="text-decoration: none;color: inherit;">
                            <h1 id="crear" style="font-family: 'Bebas Neue', sans-serif;transition: 0.4s;">Crear</h1>
                        </a></div>
                    <div class="col-3 text-center" style="border-left-width: 1px;border-left-style: solid;"><a href="prendaedicion.html" style="text-decoration: none;color: inherit;">
                            <h1 id="editar" style="font-family: 'Bebas Neue', sans-serif;transition: 0.4s;">Editar</h1>
                        </a></div>
                </div>
            </div>
        </section>
        <section class="mt-4 mb-5">
            <div class="container my-0">
                <div class="row justify-content-center my-0 py-0">
                    <div class="col-11 col-md-8 ps-0 pe-0 my-0">
                        <form>
                            <div class="my-3"><input class="border rounded-2 form-control" type="text" placeholder="Nombre del producto*" required="">
                                <p class="small text-black text-opacity-50 ms-0 ps-3">Máximo 100 caracteres.</p>
                            </div>
                            <div class="my-3"><input class="form-control" type="number" min="0" placeholder="Precio ($)*" required="" step="0.01">
                                <p class="small text-black text-opacity-50 ms-0 ps-3">Mayor a 0. Hasta 2 decimales (ejemplo: 19.99)</p>
                            </div>
                            <div class="my-3"><select class="form-select" required="">
                                    <option value="" selected="">Categoría*</option>
                                    <option value="playera">Playera</option>
                                    <option value="hoodie">Hoodie</option>
                                    <option value="gorra">Gorra</option>
                                </select></div>
                            <div class="my-3"><select class="form-select" required="">
                                    <option value="" selected="">Subcategoría*</option>
                                    <option value="deportiva">Deportiva</option>
                                    <option value="casual">Casual</option>
                                    <option value="elegante">Elegante</option>
                                    <option value="otro">Otro</option>
                                </select></div>
                            <div class="my-3"><textarea class="form-control" placeholder="Descripción*" maxlength="500" required=""></textarea>
                                <p class="small text-black text-opacity-50 ms-0 ps-3">Máximo 500 caracteres.</p>
                            </div>
                            <div class="my-3">
                                <div class="row">
                                    <div class="col">
                                        <p class="ps-3">Tallas y colores disponibles</p>
                                    </div>
                                </div>
                                <div class="row gy-3 justify-content-center">
                                    <div class="col">
                                        <div class="table-responsive rounded-2">
                                            <table class="table table-striped table-borderless">
                                                <thead class="text-center">
                                                    <tr>
                                                        <th>Talla</th>
                                                        <th style="background: var(--bs-black);color: rgb(255,255,255);">Negro</th>
                                                        <th>Blanco</th>
                                                        <th style="background: var(--bs-red);">Rojo</th>
                                                        <th style="background: var(--bs-blue);">Azul</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr>
                                                        <td class="text-center">XS</td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                    </tr>
                                                    <tr>
                                                        <td class="text-center">S</td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                    </tr>
                                                    <tr>
                                                        <td class="text-center">M</td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                    </tr>
                                                    <tr>
                                                        <td class="text-center">L</td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                    </tr>
                                                    <tr>
                                                        <td class="text-center">XL</td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                        <td><input class="form-control" type="number" min="0" placeholder="0" step="1" max="999" value="0"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-3 mb-5">
                                <div class="row justify-content-start">
                                    <div class="col-auto">
                                        <p class="ps-3">Imágenes del producto*</p>
                                    </div>
                                </div>
                                <div class="row justify-content-center pt-0 my-2">
                                    <div class="col"><input class="form-control" type="file" required="" accept=".png, .jpg, .jpeg"></div>
                                </div>
                                <div class="row justify-content-center pt-0 my-2">
                                    <div class="col"><input class="form-control" type="file" required="" accept=".png, .jpg, .jpeg"></div>
                                </div>
                                <div class="row justify-content-center pt-0 my-2">
                                    <div class="col"><input class="form-control" type="file" required="" accept=".png, .jpg, .jpeg"></div>
                                </div>
                            </div>
                            <div class="text-center my-3"><input class="btn fs-3 border rounded-0 btn-primary px-5" type="submit" id="submit" style="font-family: 'Bebas Neue', sans-serif;letter-spacing: 2px;transition: 0.4s;" value="Crear"></div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- ========== FOOTER ========== -->
  <div id="footer-placeholder"></div>

    <script src="../js-scripts/script-cargarcomponentes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
