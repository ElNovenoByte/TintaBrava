spring.application.name=tintabrava

#Configurar atributos para mi db (en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/tintabravadb?createDatabaseIfNotExist=true
spring.datasource.username=admin
spring.datasource.password=admin

#Configurar acciµn para JPA
spring.jpa.hibernate.ddl-auto=update

#Configurar logs para informaciµn de JPA (dev)
spring.jpa.hibernate.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurar formato de fechas
spring.jackson.serialization.write-dates-as-timestamps=false